name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            cc: gcc
            ext: ''
            target: superc-linux-x64
          - os: macos
            cc: clang
            ext: ''
            target: superc-macos-arm64
          - os: windows
            cc: gcc
            ext: '.exe'
            target: superc-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make libomp-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install make || true

      - name: Build
        run: make CC=${{ matrix.cc }}

      - name: Self-test
        run: ./superc${{ matrix.ext }} selftest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: superc${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true